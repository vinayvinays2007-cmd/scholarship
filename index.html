<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Eligibility Predictor</title>
</head>
<body>
    <h2>Scholarship Eligibility Predictor</h2>
    <form action="/predict" method="post">
        <label>Academic Score:</label>
        <input type="text" name="score" required><br>
        
        <label>Household Income:</label>
        <input type="text" name="income" required><br>
        
        <label>Extracurricular Participation (0 or 1):</label>
        <input type="text" name="extra" required><br>
        
        <button type="submit">Predict</button>
    </form>
    <h3>{{ prediction_text }}</h3>
</body>
</html>
